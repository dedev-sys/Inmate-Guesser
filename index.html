<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <h1 class="title">INMATE GUESSER</h1>

    <div class="game-wrapper">

        <div class="top-bar">
            <div class="score-box">
                <span class="label">SCORE:</span>
                <span id="scoreVar">0</span>
            </div>

            <div class="status-box">
                <span class="label">ROUND:</span>
                <span id="roundVar">1</span>
            </div>
        </div>

        <div class="offender-name-box">
            <h2 id="offenderName">LOADING OFFENDER</h2>
        </div>

        <div class="image-wrap">
            <img class="img" src="" id="img" alt="Offender image">
        </div>

        <div class="details-box">
            <p><strong>YOB:</strong> <span id="yobVar">---</span></p>
            <p><strong>RACE:</strong> <span id="raceVar">---</span></p>
            <p><strong>GENDER:</strong> <span id="genderVar">---</span></p>
            <p><strong>HEIGHT:</strong> <span id="heightVar">---</span></p>
            <p><strong>WEIGHT:</strong> <span id="weightVar">---</span></p>
            <p><strong>EYE COLOR:</strong> <span id="eyeColorVar">---</span></p>
            <p><strong>HAIR COLOR:</strong> <span id="hairColorVar">---</span></p>
            <p><strong>MAX POSSIBLE RELEASE DATE:</strong> <span id="releaseDateVar">---</span></p>
            <p><strong>RARITY LEVEL</strong> <span id="rarityVar">---</span></p>
            <p><strong>DANGER SCORE</strong> <span id="dangerVar">---</span></p>
        </div>

        <div class="question-box">
            <h3>Guess the Major Offense</h3>
        </div>

        <div class="choices-box">
            <button class="choice-btn" id="choice1">Choice 1</button>
            <button class="choice-btn" id="choice2">Choice 2</button>
            <button class="choice-btn" id="choice3">Choice 3</button>
            <button class="choice-btn" id="choice4">Choice 4</button>
        </div>

        <div class="bottom-buttons">
            <button class='spin-button' id="spinButtonID" data-spin>SUBMIT GUESS</button>
            <!-- <button class='spin-button' id="spinButtonID" data-spin>GO NEXT</button> -->
        </div>

        <div class="result-box">
            <p id="resultMessage"></p>
        </div>

    </div>
    <script src='server.js'></script>
    <script>

    document.getElementById("spinButtonID").addEventListener("click", async () => { 
        await bombaclatt();
    });

    const offenderName = document.getElementById("offenderName");
    const img = document.getElementById("img");

    const yobVar = document.getElementById("yobVar");
    const raceVar = document.getElementById("raceVar");
    const genderVar = document.getElementById("genderVar");
    const heightVar = document.getElementById("heightVar");
    const weightVar = document.getElementById("weightVar");
    const eyeColorVar = document.getElementById("eyeColorVar");
    const hairColorVar = document.getElementById("hairColorVar");
    const releaseDateVar = document.getElementById("releaseDateVar");
    const rarityScoreVar = document.getElementById("rarityVar");
    const dangerScoreVar = document.getElementById("dangerVar");

    const scoreVar = document.getElementById("scoreVar");
    const roundVar = document.getElementById("roundVar");
    const resultMessage = document.getElementById("resultMessage");

    const choiceButtons = [
    document.getElementById("choice1"),
    document.getElementById("choice2"),
    document.getElementById("choice3"),
    document.getElementById("choice4")
    ];

    const submitBtn = document.getElementById("spinButtonID");

    let selectedChoice = null;
    let correctOffense = "";
    let score = 0;
    let round = 1;
    let answeredThisRound = false;



    // --- RARITY SCORES ----------------------------------------------------


    function normalizeOffense(str) {
      return (str || "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function normalizeName(str) {
      return (str || "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function getOffenderStorageKey(offenderName) {
      return `offenderStats_${normalizeName(offenderName)}`;
    }

    // Higher numbers are rarer, but most rolls stay lower.
    // This returns mostly 1–60, with high values much less common.
    function weightedRarityRoll1to60() {
      const r = Math.random();
      const weighted = Math.pow(r, 2.35); // heavier toward low values
      return Math.floor(1 + weighted * 59);
    }

    function generateRarityScore(offense) {
      const normalized = normalizeOffense(offense);

      // Your known/common crime pool
      const knownCrimePool = new Set([
        "BURGLARY",
        "FRAUD",
        "ROBBERY",
        "AGGRAVATED ASSAULT",
        "ARMED ROBBERY",
        "MURDER",
        "ATMPT MURDER",
        "ARSON",
        "KIDNAPPING"
      ]);

      // If the crime is NOT in your pool, force it to be rarer
      if (!knownCrimePool.has(normalized)) {
        // guaranteed high rarity band for unknown offenses
        return Math.floor(70 + Math.random() * 31); // 70–100
      }

      // Mostly common rarity: 1–60, weighted so high scores are rarer
      let score = weightedRarityRoll1to60();

      // Tiny bonus jackpot chances to make collectibles more exciting
      const jackpotRoll = Math.random();

      if (jackpotRoll < 0.015) {
        score = Math.max(score, Math.floor(85 + Math.random() * 16)); // 85–100
      } else if (jackpotRoll < 0.06) {
        score = Math.max(score, Math.floor(61 + Math.random() * 20)); // 61–80
      }

      return Math.min(score, 100);
    }

    // puts danger score within +/- 15 points of offense
    function varyScore(base, range = 15) {
        const variation = Math.floor(Math.random() * (range * 2 + 1)) - range;
        let result = base + variation;

        // clamp between 1–100
        result = Math.max(1, Math.min(100, result));

        return result;
    }

    function getDangerScore(offense) {
      const normalized = normalizeOffense(offense);

      // Exact or near-exact mapping first
      const exactScores = {
        "BURGLARY": 10,
        "FRAUD": 5,
        "ROBBERY": 9,
        "AGGRAV ASSAULT": 10,
        "ARMED ROBBERY": 7,
        "MURDER": 3,
        "ATMPT MURDER": 2,
        "ARSON": 2,
        "DRVNG HABTL VIOLATOR": 8,
        "HABIT TRAF VIOL/OTHER": 6,
        "POSS OF FIREARM DUR CRIME": 2,
        "POSS W INT DIST COCAINE": 4,
        "POSS W INT DIST METH": 3,
        "POSS W INT DIST FENTANYL": 2,
        "POSS W INT DIST MARIJUANA": 6,
        "VIOL DNGROUS DRGS ACT": 2,
        "CRMNL DAMAGE 2ND DEGREE": 4,
        "MURDER 2ND DEGREE": 1,
        "POSS FIREARM CONVCT FELON": 7,
        "AGGRAV BATTERY": 8,
        "BURG BEF 7/1/12": 2,
        "OBSTR OF LAW ENF OFFICER": 5,
        "CHILD MOLESTATION": 1,
        "THEFT BY TAKING": 3,
        "AGGRAV ASSAULT PEACE OFCR": 3,
        "VOLUNTARY MANSLAUGHTER": 2,
        "INVOLUNTARY MANSLAUGHTER": 1,
        "THEFT BY REC STOLEN PROP": 3,
        "AGGRAV SEXUAL BATTERY": 2,
        "POSS NARCOTICS OPIATES": 4,
        "POSS METHAMPHETAMINE": 3,
        "S/D COCAINE": 1,
        "FORG 1ST BEF 7/1/12": 1,
        "POSS COCAINE": 3,
        "POSS OF MARIJUANA": 6,
        "SEX EXPLOITATION CHILD": 3,
        "TRAF METHAMPH 28-199 GM": 3,
        "RAPE": 2,
        "FAMILY VIOLENCE BATTERY": 3,
        "DOMESTIC VIOLENCE": 5,
        "TRAF COCAINE LESS 200 GM": 1,
        "TRAF COCAINE MORE 200 GM": 1,
        "TRAF METHAMPH 400+ GM": 1,
        "TRAF METH LESS 400 GM": 1,
        "TERRORIST THREATS & ACTS": 2,
        "ANIMAL CRUELTY": 1,
        "CHILD ABUSE": 2,
        "MISC CORRECTIONL INST OFF": 3,
        "BURG 2ND AFT 6/30/12": 2,
        "KIDNAPPING": 2
      };

        const base = exactScores[normalized];

        if (base !== undefined) {
            return varyScore(base, 15);
        }

        // fallback logic for incase it doesnt
        // if (normalized.includes("MURDER")) return varyScore(95, 15);
        // if (normalized.includes("KIDNAP")) return varyScore(88, 15);
        // if (normalized.includes("ROBBERY")) return varyScore(62, 15);
        // if (normalized.includes("ASSAULT")) return varyScore(72, 15);
        // if (normalized.includes("ARSON")) return varyScore(55, 15);
        // if (normalized.includes("FRAUD")) return varyScore(12, 15);

        // return varyScore(45, 15); // default
        return Math.floor(1 + Math.random() * 60);
    }

    function getOrCreateCollectibleStats(offenderName, offense) {
      const key = getOffenderStorageKey(offenderName);
      const existing = localStorage.getItem(key);

      if (existing) {
        try {
          return JSON.parse(existing);
        } catch (err) {
          console.error("Bad local collectible data, regenerating:", err);
        }
      }

      const stats = {
        offenderName: normalizeName(offenderName),
        offense: normalizeOffense(offense),
        rarityScore: generateRarityScore(offense),
        dangerScore: getDangerScore(offense),
        createdAt: Date.now()
      };

      localStorage.setItem(key, JSON.stringify(stats));
      return stats;
    }



    // -------------------------------------------------------------------------



    // Replace this with your real loader later
    async function bombaclatt() {
    if (!correctOffense || answeredThisRound) {
        await loadNextOffender();
    } else {
        submitGuess();
    }
    }

    async function loadNextOffender() {
        answeredThisRound = false;
        selectedChoice = null;
        resultMessage.textContent = "";
        resultMessage.className = "";
        submitBtn.textContent = "SUBMIT GUESS";

        choiceButtons.forEach(btn => {
            btn.classList.remove("selected", "correct", "wrong");
            btn.disabled = false;
        });

        try {
            const res = await fetch("/random-case", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                ageLow: 18,
                ageHigh: 90
            })
            });

            if (!res.ok) {
            throw new Error("Failed to fetch offender");
            }

            const data = await res.json();
            loadOffender(data);
        } catch (err) {
            console.error(err);
            resultMessage.textContent = "Failed to load offender.";
            resultMessage.className = "bad";
        }
    }

    function loadOffender(data) {
        
        const collectibleStats = getOrCreateCollectibleStats(data.name, data.offense);

        // offenderName.textContent = data.name || "---";
        offenderName.textContent = "INMATE #" + String(Math.floor(100000 + Math.random() * 900000));
        img.src = data.image || "";
        yobVar.textContent = data.yob.match(/\d{4}$/)?.[0] || "" || "---";
        raceVar.textContent = data.race || "---";
        genderVar.textContent = data.gender || "---";
        heightVar.textContent = data.height || "---";
        weightVar.textContent = data.weight || "---";
        eyeColorVar.textContent = data.eyeColor || "---";
        hairColorVar.textContent = data.hairColor || "---";
        releaseDateVar.textContent = data.releaseDate || "---";
        rarityScoreVar.textContent = collectibleStats.rarityScore || "---";
        dangerScoreVar.textContent = collectibleStats.dangerScore || "---";

        correctOffense = data.offense || "";

        choiceButtons.forEach((btn, i) => {
            btn.textContent = data.choices[i] || `Choice ${i + 1}`;
        });
    }

    function submitGuess() {
    if (!selectedChoice) {
        resultMessage.textContent = "Pick an answer first.";
        resultMessage.className = "warning";
        return;
    }

    answeredThisRound = true;

    choiceButtons.forEach(btn => {
        btn.disabled = true;

        if (btn.textContent === correctOffense) {
        btn.classList.add("correct");
        }

        if (btn.textContent === selectedChoice && selectedChoice !== correctOffense) {
        btn.classList.add("wrong");
        }
    });

    if (selectedChoice === correctOffense) {
        score += 1;
        scoreVar.textContent = score;
        resultMessage.textContent = "Correct.";
        resultMessage.className = "good";
    } else {
        resultMessage.textContent = `Wrong. Correct answer: ${correctOffense}`;
        resultMessage.className = "bad";
    }

    round += 1;
    roundVar.textContent = round;
    submitBtn.textContent = "NEXT ROUND";
    }

    choiceButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        if (answeredThisRound) return;

        selectedChoice = btn.textContent;

        choiceButtons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
    });
    });








    // Demo pool
    function getMockOffender() {
    const pool = [
        {
        name: "AARON, ANTHONY TODD",
        image: "https://via.placeholder.com/350x400?text=Offender+Image",
        yob: "1959",
        race: "BLACK",
        gender: "MALE",
        height: "5'07''",
        weight: "160",
        eyeColor: "BROWN",
        hairColor: "BLACK",
        releaseDate: "03/12/2047",
        offense: "ATMPT MURDER",

            "ATMPT MURDER",
            "BURGLARY",
            "FRAUD",
            "AGGRAVATED ASSAULT"
        ])
        },
        {
        name: "DOE, JAMES ALLEN",
        image: "https://via.placeholder.com/350x400?text=Case+2",
        yob: "1984",
        race: "WHITE",
        gender: "MALE",
        height: "6'00''",
        weight: "190",
        eyeColor: "BLUE",
        hairColor: "BROWN",
        releaseDate: "08/18/2033",
        offense: "BURGLARY",
        choices: shuffle([
            "BURGLARY",
            "ROBBERY",
            "ARSON",
            "FRAUD"
        ])
        },
        {
        name: "JOHNSON, TERRY LEE",
        image: "https://via.placeholder.com/350x400?text=Case+3",
        yob: "1977",
        race: "BLACK",
        gender: "MALE",
        height: "5'11''",
        weight: "205",
        eyeColor: "BROWN",
        hairColor: "BLACK",
        releaseDate: "11/01/2039",
        offense: "ROBBERY",
        choices: shuffle([
            "ROBBERY",
            "BURGLARY",
            "KIDNAPPING",
            "FRAUD"
        ])
        }
    ];

    return pool[Math.floor(Math.random() * pool.length)];
    }

    function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
    }

    // Load first round on startup
    loadNextOffender();
    </script>
</body>
